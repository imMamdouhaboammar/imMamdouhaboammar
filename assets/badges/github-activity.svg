<svg width="900" height="260" viewBox="0 0 900 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">GitHub activity panel</title>
  <desc id="desc">A static activity panel for Mamdouh Aboammar's GitHub profile</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="0.55" stop-color="#312E81"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#111827" flood-opacity="0.20"/>
    </filter>
  </defs>

  <rect x="12" y="12" width="876" height="236" rx="30" fill="url(#bg)" filter="url(#shadow)"/>
  <rect x="34" y="34" width="832" height="192" rx="24" fill="url(#card)" stroke="#FFFFFF" stroke-opacity="0.22"/>

  <text x="58" y="76" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="1.5">GITHUB ACTIVITY</text>
  <text x="58" y="110" fill="#E5E7EB" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17">Public builds around AI agents, frontend quality, local memory, agent routing, and marketing systems.</text>

  <g transform="translate(58 138)">
    <rect width="175" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="18" y="26" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">AI Agent Systems</text>
    <text x="18" y="45" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">agent-kernel</text>
  </g>

  <g transform="translate(248 138)">
    <rect width="175" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="18" y="26" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Frontend QA</text>
    <text x="18" y="45" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">unslop-preflight</text>
  </g>

  <g transform="translate(438 138)">
    <rect width="175" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="18" y="26" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Public Playbooks</text>
    <text x="18" y="45" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">Riftbook</text>
  </g>

  <g transform="translate(628 138)">
    <rect width="175" height="58" rx="18" fill="#FFFFFF" fill-opacity="0.13" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <text x="18" y="26" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700">Agent Routing</text>
    <text x="18" y="45" fill="#CBD5E1" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13">delegate-team</text>
  </g>
</svg>
